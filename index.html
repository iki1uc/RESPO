async function loadRespo(name){
    const res = await fetch(`/RESPO/${name}.json`);
    return await res.json();
}

async function loadAllRespos(){
    const names = ["AIR","boerse","markt3","ACSH"];
    const respos = [];

    for(const n of names){
        respos.push(await loadRespo(n));
    }

    return respos;
}
